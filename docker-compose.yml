services:
  backend:
    build: .
    image: medalarm-backend:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/medalarm.db
    expose:
      - "8000"
    volumes:
      - medalarm_data:/app/data
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      backend:
        condition: service_healthy
    profiles: ["production"]
    restart: unless-stopped

volumes:
  medalarm_data:
