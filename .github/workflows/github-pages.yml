name: Deploy MedAlarm Mini App

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:local
      - run: npm run test:component
      - name: Validate production API URL
        shell: bash
        env:
          API_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          [[ "$API_URL" == https://*/api/v1 ]] || {
            echo "VITE_API_BASE_URL must be an HTTPS URL ending in /api/v1"
            exit 1
          }
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_BASE_PATH: /MedAlarm/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
