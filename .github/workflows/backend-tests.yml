name: Backend Tests

on:
  push:
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

concurrency:
  group: backend-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest -q
